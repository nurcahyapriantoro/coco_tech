# ══════════════════════════════════════════════════════════════════════════
#  CocoTech — Nginx Configuration
#  Mode: HTTP only (IP-based, no domain/SSL yet)
#
#  Usage on Droplet:
#    sudo cp nginx.conf /etc/nginx/sites-available/cocotech
#    sudo ln -s /etc/nginx/sites-available/cocotech /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#
#  Ganti YOUR_DROPLET_IP dengan IP address Droplet Anda
#
#  Upgrade ke HTTPS nanti (setelah punya domain):
#    sudo certbot --nginx -d yourdomain.com
#    Lalu gunakan nginx.conf versi SSL yang ada di DEPLOYMENT.md
# ══════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;

    # Ganti dengan IP Droplet Anda, atau _ untuk menerima semua
    server_name YOUR_DROPLET_IP _;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    server_tokens off;

    # ── Gzip compression ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Timeouts ──────────────────────────────────────────────────────────
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ── Proxy ke Node.js (unified: backend + frontend dist) ───────────────
    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Health check endpoint ─────────────────────────────────────────────
    location /api/health {
        proxy_pass         http://127.0.0.1:4000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        access_log off;
    }

    # ── Block hidden files (.env, .git, etc.) ─────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Block sensitive file extensions ───────────────────────────────────
    location ~* \.(env|log|sh|bak|sql|conf|db)$ {
        deny all;
        return 404;
    }

    # ── Disable access to node_modules ────────────────────────────────────
    location /node_modules/ {
        deny all;
        return 404;
    }
}
