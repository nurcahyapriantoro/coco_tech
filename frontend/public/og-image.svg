<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="100%" stop-color="#0D1B3E"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0071E3"/>
      <stop offset="100%" stop-color="#2997FF"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#0071E3" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow circles (ambient light) -->
  <circle cx="200" cy="315" r="280" fill="#0071E3" opacity="0.06" filter="url(#glow)"/>
  <circle cx="1050" cy="180" r="200" fill="#2997FF" opacity="0.07" filter="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="5" height="270" rx="3" fill="#0071E3" opacity="0.8"/>

  <!-- Logo mark (CocoTech C icon) -->
  <g transform="translate(108, 185)" filter="url(#softGlow)">
    <circle cx="40" cy="40" r="40" fill="#0B1020" stroke="#0071E3" stroke-width="2" stroke-opacity="0.4"/>
    <path d="M 55 14 A 28 28 0 1 0 55 66" stroke="#0071E3" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <circle cx="59" cy="40" r="5" fill="#2997FF"/>
  </g>

  <!-- Brand name -->
  <text x="210" y="234" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="72" font-weight="900" letter-spacing="-2" fill="white">
    CocoTech
  </text>

  <!-- Blue underline accent -->
  <rect x="210" y="248" width="380" height="4" rx="2" fill="#0071E3" opacity="0.9"/>

  <!-- Tagline -->
  <text x="210" y="310" font-family="'Arial', sans-serif"
        font-size="26" font-weight="400" letter-spacing="4" fill="#2997FF" opacity="0.9">
    DIGITALIZE · DOMINATE · DEPLOY
  </text>

  <!-- Main headline -->
  <text x="210" y="390" font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="38" font-weight="700" fill="white" opacity="0.95">
    IT Agency untuk UMKM &amp; Startup Indonesia
  </text>

  <!-- Sub description -->
  <text x="210" y="440" font-family="'Arial', sans-serif"
        font-size="24" font-weight="400" fill="#94A3B8">
    Web Development · Data Engineering · AI Integration
  </text>

  <!-- Bottom domain badge -->
  <rect x="210" y="500" width="320" height="52" rx="26" fill="#0071E3" opacity="0.15" stroke="#0071E3" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="370" y="533" font-family="'Arial', sans-serif"
        font-size="22" font-weight="600" fill="#2997FF" text-anchor="middle">
    cocotech.studio
  </text>

  <!-- Right side: stats block -->
  <g transform="translate(820, 200)">
    <!-- Stat cards -->
    <rect width="280" height="80" rx="12" fill="white" opacity="0.04" stroke="#0071E3" stroke-width="1" stroke-opacity="0.3"/>
    <text x="30" y="38" font-family="'Arial Black', sans-serif" font-size="32" font-weight="900" fill="#2997FF">25+</text>
    <text x="30" y="62" font-family="'Arial', sans-serif" font-size="16" fill="#94A3B8">Proyek Selesai</text>

    <rect y="100" width="280" height="80" rx="12" fill="white" opacity="0.04" stroke="#0071E3" stroke-width="1" stroke-opacity="0.3"/>
    <text x="30" y="138" font-family="'Arial Black', sans-serif" font-size="32" font-weight="900" fill="#2997FF">4.9★</text>
    <text x="30" y="162" font-family="'Arial', sans-serif" font-size="16" fill="#94A3B8">Rating Rata-Rata</text>

    <rect y="200" width="280" height="80" rx="12" fill="white" opacity="0.04" stroke="#0071E3" stroke-width="1" stroke-opacity="0.3"/>
    <text x="30" y="238" font-family="'Arial Black', sans-serif" font-size="32" font-weight="900" fill="#2997FF">4+</text>
    <text x="30" y="262" font-family="'Arial', sans-serif" font-size="16" fill="#94A3B8">Tahun Pengalaman</text>
  </g>
</svg>
